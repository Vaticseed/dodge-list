name: Update Ranks

on:
  schedule:
    # Runs once every hour. GitHub's free scheduler can run a few
    # minutes late at busy times, but it will run close to this.
    - cron: '0 * * * *'
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

concurrency:
  group: update-ranks
  cancel-in-progress: false # if a run is still going, queue the next one instead of overlapping

jobs:
  update-ranks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Update ranks
        env:
          HENRIK_API_KEY: ${{ secrets.HENRIK_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DRY_RUN: ${{ vars.DRY_RUN }}
        run: npm run update-ranks
